name = "vany"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Routes for all services
routes = [
  { pattern = "start.vany.sh", custom_domain = true },
  { pattern = "mtp.vany.sh", custom_domain = true },
  { pattern = "reality.vany.sh", custom_domain = true },
  { pattern = "wg.vany.sh", custom_domain = true },
  { pattern = "vray.vany.sh", custom_domain = true },
  { pattern = "ws.vany.sh", custom_domain = true },
  { pattern = "dnstt.vany.sh", custom_domain = true },
  { pattern = "conduit.vany.sh", custom_domain = true },
  { pattern = "stats.vany.sh", custom_domain = true },
  { pattern = "vany.sh", custom_domain = true }
]

# Durable Objects for live stats relay
[[durable_objects.bindings]]
name = "STATS_RELAY"
class_name = "StatsRelay"

# SosRelay - being deleted, binding kept until migration applies
[[durable_objects.bindings]]
name = "SOS_RELAY"
class_name = "SosRelay"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["StatsRelay"]

[[migrations]]
tag = "v3"
delete_classes = ["SosRelay"]
