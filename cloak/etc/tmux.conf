# Cloak tmux configuration
# Vany-themed status bar with green #2eb787 palette

# ── General ──────────────────────────────────────────────────────────────────

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Prefix ───────────────────────────────────────────────────────────────────

# Keep default Ctrl-b, add Ctrl-a as secondary
set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

# ── Keybindings ──────────────────────────────────────────────────────────────

# Ctrl+N: new window with tool selector
bind -n C-n new-window

# Ctrl+T: select window interactively
bind -n C-t choose-tree -Zw

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with Alt+arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Navigate windows with Shift+arrow
bind -n S-Left previous-window
bind -n S-Right next-window

# Reload config
bind r source-file ~/.cloak/etc/tmux.conf \; display "Config reloaded"

# ── Status Bar ───────────────────────────────────────────────────────────────

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#232323,fg=#9ab0a6"

# Left: Cloak branding
set -g status-left-length 20
set -g status-left "#[bg=#2eb787,fg=#232323,bold] CLOAK #[bg=#232323,fg=#2eb787] "

# Right: time + session
set -g status-right-length 40
set -g status-right "#[fg=#9ab0a6,dim]#S #[fg=#466242]| #[fg=#9ab0a6]%H:%M "

# Window tabs
setw -g window-status-format "#[fg=#9ab0a6] #I:#W "
setw -g window-status-current-format "#[fg=#2eb787,bold] #I:#W "
setw -g window-status-separator "#[fg=#343434]|"

# ── Pane Borders ─────────────────────────────────────────────────────────────

set -g pane-border-style "fg=#343434"
set -g pane-active-border-style "fg=#2eb787"

# ── Messages ─────────────────────────────────────────────────────────────────

set -g message-style "bg=#232323,fg=#2eb787"
set -g message-command-style "bg=#232323,fg=#e5e885"
